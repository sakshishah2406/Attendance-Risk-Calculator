<!DOCTYPE html>
<html>

<head>

    <title>Attendance Risk Calculator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Attendance Risk Calculator</h1>

<h2>Semester Setup</h2>

<input
type="date"
id="startDate">

<br><br>

<input
type="date"
id="endDate">

<br><br>

<input
type="number"
id="minAttendance"
value="75">

<br><br>

<button onclick="saveSemesterData()">
Save Semester
</button>

<hr>

<h2>Subjects</h2>

<input
type="text"
id="subjectName"
placeholder="DBMS">

<button onclick="addSubjectData()">
Add Subject
</button>

<ul id="subjectList"></ul>

<hr>

<h2>Weekly Timetable</h2>

<table border="1">

<thead>

<tr>
    <th>Subject</th>
    <th>Mon</th>
    <th>Tue</th>
    <th>Wed</th>
    <th>Thu</th>
    <th>Fri</th>
</tr>

</thead>

<tbody id="timetableBody">

</tbody>

</table>

<br>

<button>
Save Timetable
</button>

<hr>

<h2>Today's Classes</h2>

<div id="attendanceContainer">

</div>

<hr>

<h2>Attendance Stats</h2>

<div id="statsContainer">

</div>

<hr>

<h2>Bunk Calculator</h2>

<div id="bunkContainer">

</div>

<script src="logic.js"></script>
<script src="app.js"></script>

</body>
</html>
