<!DOCTYPE html>
<html>

<head>

    <title>Attendance Risk Calculator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Attendance Risk Calculator</h1>

<h2>Semester Setup</h2>

<input
type="date"
id="startDate">

<br><br>

<input
type="date"
id="endDate">

<br><br>

<input
type="number"
id="minAttendance"
value="75">

<br><br>

<button onclick="saveSemesterData()">
Save Semester
</button>

<hr>

<h2>Subjects</h2>

<input
type="text"
id="subjectName"
placeholder="DBMS">

<button onclick="addSubjectData()">
Add Subject
</button>

<ul id="subjectList"></ul>

<script src="logic.js"></script>
<script src="app.js"></script>

</body>
</html>
